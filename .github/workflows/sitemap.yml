name: Auto Generate Sitemap

on:
  schedule:
    - cron: '0 0 * * *' # 매일 새벽 9시(한국시간) 실행
  workflow_dispatch: # 버튼 눌러서 즉시 실행 기능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 파이썬 실행
        run: python generate_sitemap.py
      - name: 변경사항 커밋 및 푸시
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sitemap.xml
          git commit -m "chore: update sitemap.xml [skip ci]" || echo "No changes"
          git push
