name: Build Root Site

on:
  push:
    branches:
      - main
    paths:
      - "generate_site.py"
      - "generate_sitemap.py"
      - "site-config.json"
      - "templates/**"
      - ".github/workflows/site.yml"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: root-site-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate root site assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_site.py
      - name: Commit generated assets
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .nojekyll index.html sitemap.xml rss.xml feed.xml robots.txt projects.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh root site assets [skip ci]"
          git push
